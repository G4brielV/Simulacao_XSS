<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Fórum de Tecnologia</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; }
        .comentario { border-bottom: 1px solid #ddd; padding: 10px; margin-bottom: 5px; background: #f9f9f9; }
        .user { font-weight: bold; color: #2c3e50; }
        .form-box { background: #e0e0e0; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        input { padding: 8px; margin: 5px 0; width: 95%; }
        button { padding: 10px; background: #2c3e50; color: white; border: none; cursor: pointer; }
        button:hover { background: #1a252f; }
    </style>
</head>
<body>
    <h1>Fórum de Discussão</h1>

    <div class="form-box">
        <h3>Deixe seu comentário:</h3>
        <input type="text" id="nomeUsuario" placeholder="Seu Nome">
        <input type="text" id="textoComentario" placeholder="Escreva seu comentário ou payload XSS...">
        <button onclick="adicionarComentario()">Enviar Comentário</button>
    </div>
    
    <div id="sessao-comentarios">
        <h3>Comentários da Comunidade:</h3>
        <div id="container-comentarios">
            </div>
    </div>

    <script>

        let muralDeComentarios = [
            { usuario: "Joao Silva", texto: "Ótimo post! Me ajudou muito na faculdade de ADS." },
            { usuario: "Maria Souza", texto: "Alguém sabe se o Java ainda é usado em 2026?" }
        ];

        function renderizarComentarios() {
            const container = document.getElementById('container-comentarios');
            container.innerHTML = ''; 

            muralDeComentarios.forEach(item => {
                const div = document.createElement('div');
                div.className = 'comentario';
                div.innerHTML = `<span class="user">${item.usuario}:</span> ${item.texto}`;
                container.appendChild(div);
  
                // Força a execução de qualquer tag <script> que tenha sido injetada via innerHTML
                const scripts = div.getElementsByTagName('script');
                for (let script of scripts) {
                    const novoScript = document.createElement('script');
                    if (script.src) {
                        novoScript.src = script.src;
                    } else {
                        novoScript.innerHTML = script.innerHTML;
                    }
                    document.body.appendChild(novoScript);
                }
            });
        }

        function adicionarComentario() {
            const nome = document.getElementById('nomeUsuario').value;
            const texto = document.getElementById('textoComentario').value;

            if(nome && texto) {
                muralDeComentarios.push({ usuario: nome, texto: texto });
                document.getElementById('nomeUsuario').value = '';
                document.getElementById('textoComentario').value = '';
                renderizarComentarios();
            } else {
                alert("Preencha os campos!");
            }
        }
        renderizarComentarios();
    </script>
</body>
</html>
